server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**,/api/v1/preferences/**
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/events/**
        - id: resource-service
          uri: ${RESOURCE_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/resources/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/bookings/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
