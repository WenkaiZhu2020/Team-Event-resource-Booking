services:
  postgres:
    image: postgres:16
    container_name: trms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_resource_mgmt}
      POSTGRES_USER: ${POSTGRES_USER:-team_resource}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_resource}
    ports:
      - "5432:5432"
    volumes:
      - trms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-team_resource} -d ${POSTGRES_DB:-team_resource_mgmt}"]
      interval: 10s
      timeout: 5s
      retries: 8

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: trms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 30s

  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth-service/Dockerfile
    container_name: trms-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-team_resource_mgmt}
      AUTH_DB_USERNAME: ${POSTGRES_USER:-team_resource}
      AUTH_DB_PASSWORD: ${POSTGRES_PASSWORD:-team_resource}
      JWT_ISSUER: ${JWT_ISSUER:-team-resource-auth}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-VEVBTV9SRVNPVVJDRV9NQU5BR0VNRU5UX0RFVl9TRUNSRVRfSFM1Nl8zMl9CWVRFUw==}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      USER_SERVICE_INTEGRATION_ENABLED: true
      USER_SERVICE_BASE_URL: http://user-service:8082
      USER_SERVICE_API_KEY: ${USER_SERVICE_API_KEY:-change-me}
    ports:
      - "8081:8081"

  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    container_name: trms-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      USER_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-team_resource_mgmt}
      USER_DB_USERNAME: ${POSTGRES_USER:-team_resource}
      USER_DB_PASSWORD: ${POSTGRES_PASSWORD:-team_resource}
      JWT_ISSUER: ${JWT_ISSUER:-team-resource-auth}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-VEVBTV9SRVNPVVJDRV9NQU5BR0VNRU5UX0RFVl9TRUNSRVRfSFM1Nl8zMl9CWVRFUw==}
      USER_SERVICE_API_KEY: ${USER_SERVICE_API_KEY:-change-me}
    ports:
      - "8082:8082"

  event-service:
    build:
      context: ./backend
      dockerfile: services/event-service/Dockerfile
    container_name: trms-event
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      EVENT_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-team_resource_mgmt}
      EVENT_DB_USERNAME: ${POSTGRES_USER:-team_resource}
      EVENT_DB_PASSWORD: ${POSTGRES_PASSWORD:-team_resource}
      JWT_ISSUER: ${JWT_ISSUER:-team-resource-auth}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-VEVBTV9SRVNPVVJDRV9NQU5BR0VNRU5UX0RFVl9TRUNSRVRfSFM1Nl8zMl9CWVRFUw==}
    ports:
      - "8083:8083"

  api-gateway-service:
    build:
      context: ./backend
      dockerfile: services/api-gateway-service/Dockerfile
    container_name: trms-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      event-service:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      EVENT_SERVICE_URL: http://event-service:8083
    ports:
      - "8080:8080"

volumes:
  trms_postgres_data:
